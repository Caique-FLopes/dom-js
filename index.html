<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Expansivo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header id="header">
        <div>
            <img src="./logo.png" alt="Logo Empresa Engenharia">
        </div>
        <nav>
            <button></button>
            <ul class="">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./sobre-nos.html">Sobre Nós</a></li>
                <li><a href="./servicos.html">Serviços</a></li>
                <li><a href="./clientes.html">Clientes</a></li>
                <li><a href="./contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <form action="" id="formContato">
                <div class="headerForm">
                    <h2>Receba nossas notificações!</h2>
                </div>
                <div class="rowInput">
                    <label for="cpf">CPF</label>
                    <input type="text" placeholder="000.000.000-00" inputmode="numeric" id="cpf" required>
                    <p class="messageError cpf"></p>
                </div>
                <div class="rowInput">
                    <label for="email">Email</label>
                    <input type="email" placeholder="email@dominio.com" id="email" required>
                    <p class="messageError email"></p>
                </div>
                <div class="rowInput">
                    <label for="tel">Telefone</label>
                    <input type="tel" placeholder="(99) 99999-9999" id="tel">
                    <p class="messageError tel"></p>
                </div>
                <div class="rowInput">
                    <button id="limparForm">Limpar</button>
                    <button id="enviarForm">Enviar</button>
                </div>
            </form>
        </section>
    </main>
    <script src="./script.js"></script>
</body>
</html>
